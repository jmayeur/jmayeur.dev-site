<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Fluffy dog face">
  <!-- Head/Face -->
  <ellipse cx="32" cy="35" rx="22" ry="24" fill="#1a1a1a"/>
  
  <!-- Top fur tuft -->
  <path d="M 15 15 Q 12 8 32 5 Q 52 8 49 15 Q 50 12 32 10 Q 14 12 15 15" fill="#2a2a2a"/>
  
  <!-- White chest/chin area -->
  <ellipse cx="32" cy="48" rx="14" ry="10" fill="#d0d0d0"/>
  
  <!-- Left ear -->
  <ellipse cx="15" cy="22" rx="6" ry="10" fill="#1a1a1a"/>
  <ellipse cx="15" cy="22" rx="3" ry="6" fill="#2a2a2a"/>
  
  <!-- Right ear -->
  <ellipse cx="49" cy="22" rx="6" ry="10" fill="#1a1a1a"/>
  <ellipse cx="49" cy="22" rx="3" ry="6" fill="#2a2a2a"/>
  
  <!-- Left eye white -->
  <ellipse cx="26" cy="30" rx="5" ry="7" fill="#ffffff"/>
  
  <!-- Right eye white -->
  <ellipse cx="38" cy="30" rx="5" ry="7" fill="#ffffff"/>
  
  <!-- Left pupil -->
  <circle cx="26" cy="32" r="3.5" fill="#1a1a1a"/>
  <circle cx="27" cy="30" r="1.5" fill="#ffffff"/>
  
  <!-- Right pupil -->
  <circle cx="38" cy="32" r="3.5" fill="#1a1a1a"/>
  <circle cx="39" cy="30" r="1.5" fill="#ffffff"/>
  
  <!-- Nose -->
  <ellipse cx="32" cy="42" rx="3" ry="2.5" fill="#000000"/>
  
  <!-- Mouth hint -->
  <path d="M 32 42 Q 30 45 28 44" stroke="#1a1a1a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <path d="M 32 42 Q 34 45 36 44" stroke="#1a1a1a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</svg>
